name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  dashboard:
    name: Dashboard (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: patientnova_dasboard

    strategy:
      matrix:
        node-version: [22.x]
      
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: patientnova_dasboard/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  server:
    name: Server (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: patientnova_server

    strategy:
      matrix:
        node-version: [22.x]

    env:
      NODE_ENV: test
      PORT: "3001"
      DATABASE_URL: postgresql://user:password@localhost:5432/dummy
      ENCRYPTION_KEY: dummy-encryption-key-123456
      LOG_LEVEL: info
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "30"
      BCRYPT_ROUNDS: "12"
      COOKIE_DOMAIN: localhost
      MAX_FAILED_ATTEMPTS: "5"
      LOCKOUT_DURATION_MS: "900000"
      DEFAULT_TIMEZONE: America/Bogota
      DEFAULT_CURRENCY: COP
      ENABLE_SCHEDULER: "false"
      CRON_SCHEDULE: "* * * * *"
      TWILIO_ACCOUNT_SID: dummySID
      TWILIO_AUTH_TOKEN: dummyToken
      TWILIO_WHATSAPP_FROM: dummyNumber
      TWILIO_SMS_FROM: dummySMSNumber
      TWILIO_WEBHOOK_BASE_URL: https://example.com/twilio
      TWILIO_WHATSAPP_USER_REMINDER_SID: dummyReminderSid
      TWILIO_WHATSAPP_USER_REMINDER_2_APPT_SID: dummyReminder2Sid
      TWILIO_WHATSAPP_USER_REMINDER_3_APPT_SID: dummyReminder3Sid
      TWILIO_WHATSAPP_USER_REMINDER_4_APPT_SID: dummyReminder4Sid
      TWILIO_WHATSAPP_USER_REMINDER_5_APPT_SID: dummyReminder5Sid
      TWILIO_WHATSAPP_USER_REMINDER_6_APPT_SID: dummyReminder6Sid
      TWILLO_WHATSAPP_USER_APPOINTMENT_STATUS_UPDATE_SID: dummyStatusSid
      TWILLO_WHATSAPP_PATIENT_APPOINTMENT_MEETING_LINK_SID: dummyMeetingLinkSid
      AUTH_SECRET: dummy-auth-secret
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: dummy-admin-password
      GOOGLE_CLIENT_ID: dummy-google-client-id
      GOOGLE_CLIENT_SECRET: dummy-google-client-secret
      GOOGLE_REFRESH_TOKEN: dummy-google-refresh-token
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: patientnova_server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/dummy
      - run: npm run typecheck
      - run: npm test
