name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  portal:
    name: Portal (Node 22.x)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Portal

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          cache-dependency-path: Portal/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test

  server:
    name: Server (Node 22.x)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: patientnova_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d patientnova_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: "3001"
      DATABASE_URL: postgresql://test:test@localhost:5432/patientnova_test
      ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || '' }}
      LOG_LEVEL: info
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "30"
      BCRYPT_ROUNDS: "12"
      COOKIE_DOMAIN: localhost
      MAX_FAILED_ATTEMPTS: "5"
      LOCKOUT_DURATION_MS: "900000"
      DEFAULT_TIMEZONE: America/Bogota
      DEFAULT_CURRENCY: COP
      ENABLE_SCHEDULER: "false"
      DAILY_REMINDER_HOUR: "18"
      CRON_SCHEDULE: "* * * * *"
      TWILIO_ACCOUNT_SID: dummySID
      TWILIO_AUTH_TOKEN: dummyToken
      TWILIO_WHATSAPP_FROM: dummyNumber
      TWILIO_SMS_FROM: dummySMSNumber
      TWILIO_WEBHOOK_BASE_URL: https://example.com/twilio
      TWILIO_WHATSAPP_USER_REMINDER_SID: dummyReminderSid
      TWILIO_WHATSAPP_USER_REMINDER_2_APPT_SID: dummyReminder2Sid
      TWILIO_WHATSAPP_USER_REMINDER_3_APPT_SID: dummyReminder3Sid
      TWILIO_WHATSAPP_USER_REMINDER_4_APPT_SID: dummyReminder4Sid
      TWILIO_WHATSAPP_USER_REMINDER_5_APPT_SID: dummyReminder5Sid
      TWILIO_WHATSAPP_USER_REMINDER_6_APPT_SID: dummyReminder6Sid
      TWILIO_WHATSAPP_USER_APPOINTMENT_STATUS_UPDATE_SID: dummyStatusSid
      TWILIO_WHATSAPP_PATIENT_APPOINTMENT_MEETING_LINK_SID: dummyMeetingLinkSid
      AUTH_SECRET: dummy-auth-secret
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: dummy-admin-password
      GOOGLE_CLIENT_ID: dummy-google-client-id
      GOOGLE_CLIENT_SECRET: dummy-google-client-secret
      GOOGLE_REFRESH_TOKEN: dummy-google-refresh-token
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          cache-dependency-path: Server/package-lock.json
      - name: Generate encryption key
        run: echo "ENCRYPTION_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U test -d patientnova_test; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time" >&2
          exit 1
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:integration
