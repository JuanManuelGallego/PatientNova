services:
  postgres-test:
    image: postgres:18
    container_name: patientnova-postgres-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: patientnova_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d patientnova_test"]
      interval: 5s
      timeout: 5s
      retries: 10
